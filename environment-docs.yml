name: marine_qc

channels:
    - conda-forge
    - nodefaults

dependencies:
    #marine_qc
    - python>=3.10,<3.15
    - xclim
    - cf_xarray
    - matplotlib
    - pyproj

    #development
    - bump-my-version >=1.3.0
    - codespell=2.4.2
    - coverage >=7.13.4
    - deptry =0.25.1
    - distributed >=2.0
    - flake8 >=7.3.0
    - flake8-rst-docstrings >=0.4.0
    - flit >=3.11.0,<4.0
    - notebook
    - pip >=26.0.1
    - prek >=0.3.0
    - pylint >=4.0.4
    - pytest >=9.0.2
    - pytest-cov >=7.0.0
    - pytest-socket >=0.6.0
    - pytest-xdist >=3.2
    - ruff >=0.15.9
    - vulture =2.14

    #documentation
    - ipykernel
    - ipython >= 8.10.0
    - myst-nb >= 1.2.0
    - nbconvert >=7.16.4
    - numpydoc >=1.10.0
    - sphinx >=8.0.0
    - sphinx-autodoc-typehints
    - sphinx-codeautolink >=0.16.2
    - sphinx-copybutton >=0.5.2
    - furo >=2023.9.10
